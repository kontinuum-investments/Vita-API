name: Trigger auto deployment for vita-api-test

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ development ]
    paths:
    - '**'
    - '.github/workflows/vita-api-test-AutoDeployTrigger-eb1766c3-1dbd-413a-ac5e-3d54d976e8c2.yml'

  # Allow mannually trigger 
  workflow_dispatch:
      
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.VITAAPITEST_AZURE_CREDENTIALS }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }} 
          registryUrl: docker.io
          registryUsername: ${{ secrets.VITAAPITEST_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.VITAAPITEST_REGISTRY_PASSWORD }}
          containerAppName: vita-api-test
          resourceGroup: vitaapitest
          imageToBuild: kavinduathaudha/vita-api-test:${{ github.sha }}
          

     

