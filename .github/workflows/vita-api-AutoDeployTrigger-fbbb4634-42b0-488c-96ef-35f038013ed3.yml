name: Trigger auto deployment for vita-api

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ production ]
    paths:
    - '//**'
    - '.github/workflows/vita-api-AutoDeployTrigger-fbbb4634-42b0-488c-96ef-35f038013ed3.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.VITAAPI_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.VITAAPI_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.VITAAPI_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }} 
          registryUrl: docker.io
          registryUsername: ${{ secrets.VITAAPI_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.VITAAPI_REGISTRY_PASSWORD }}
          containerAppName: vita-api
          resourceGroup: vita
          imageToBuild: kavinduathaudha/vita-api:${{ github.sha }}
          dockerfilePath: Dockerfile


