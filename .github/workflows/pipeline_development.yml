name: Push to Docker Hub and Deploy to Azure Container

on:
  push:
    branches:
      [ development ]

permissions:
  id-token: write

jobs:
  Validate:
    runs-on: ubuntu-latest
    environment: CI/CD Pipeline
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Installing Dependencies
        run: python3 -m pip install -r requirements-dev.txt && python3 -m pip install -r requirements.txt

      - name: Sirius SDK installation
        run: python3 -m pip uninstall -y aorta-sirius && python3 -m pip install aorta-sirius-dev

      - name: Running MyPy check
        run: mypy . --install-types --non-interactive

      - name: Running Tests
        shell: bash
        env:
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_KEY_VAULT_URL: ${{ secrets.AZURE_KEY_VAULT_URL }}
        run: pytest --cov vita-api api/tests --cov-report xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  Build-and-Deploy:
    needs: Validate
    runs-on: ubuntu-latest
    environment: Test
    permissions:
      id-token: write

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry and deploy to Azure container
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: docker.io
          registryUsername: ${{ vars.DOCKERHUB_USERNAME }}
          registryPassword: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
          containerAppName: ${{ vars.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
          imageToBuild: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPOSITORY }}:dev
          environmentVariables: AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }} AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }} AZURE_KEY_VAULT_URL=${{ secrets.AZURE_KEY_VAULT_URL }} AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }} ENVIRONMENT=${{ vars.ENVIRONMENT }}

      - name: Restart Revision
        shell: bash
        run: |
          export REVISION_NAME=$(az containerapp revision list --name ${{ vars.AZURE_CONTAINER_APP_NAME }} --resource-group ${{ vars.AZURE_RESOURCE_GROUP_NAME }} --query "[0].name")
          az containerapp revision restart --revision "${REVISION_NAME//\"/}" --resource-group ${{ vars.AZURE_RESOURCE_GROUP_NAME }}