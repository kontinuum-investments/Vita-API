name: Push to Docker Hub and Deploy to Azure Container

on:
  push:
    branches:
      [ development ]

permissions:
  id-token: write

jobs:
  Validate:
    runs-on: ubuntu-latest
    environment: CI/CD Pipeline
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Installing Dependencies
        run: python3 -m pip install -r requirements-dev.txt && python3 -m pip install -r requirements.txt

      - name: Sirius SDK installation
        run: python3 -m pip install aorta-sirius-dev

      - name: Running MyPy check
        run: mypy . --install-types --non-interactive

      - name: Running Tests
        shell: bash
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          WISE_PRIMARY_ACCOUNT_API_KEY: ${{ secrets.WISE_PRIMARY_ACCOUNT_API_KEY }}
          WISE_SECONDARY_ACCOUNT_API_KEY: ${{ secrets.WISE_SECONDARY_ACCOUNT_API_KEY }}
          APPLICATION_NAME: ${{ vars.APPLICATION_NAME }}
          ENTRA_ID_CLIENT_ID: ${{ secrets.ENTRA_ID_CLIENT_ID }}
          ENTRA_ID_TENANT_ID: ${{ secrets.ENTRA_ID_TENANT_ID }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
          MONTHLY_FINANCES_EXCEL_FILE_LINK: ${{ secrets.MONTHLY_FINANCES_EXCEL_FILE_LINK }}
          DISCORD_SERVER_OWNER_USERNAME: ${{ vars.DISCORD_SERVER_OWNER_USERNAME }}
        run: pytest --cov vita-api api/tests --cov-report xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  Build-and-Deploy:
    needs: Validate
    runs-on: ubuntu-latest
    environment: Test
    permissions:
      id-token: write

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.ENTRA_ID_CLIENT_ID }}
          tenant-id: ${{ secrets.ENTRA_ID_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry and deploy to Azure container
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}
          registryUrl: docker.io
          registryUsername: ${{ vars.DOCKERHUB_USERNAME }}
          registryPassword: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
          containerAppName: ${{ vars.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP_NAME }}
          imageToBuild: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPOSITORY }}:dev
          environmentVariables: APPLICATION_NAME=${{ vars.APPLICATION_NAME }} DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }} SENTRY_URL=${{ secrets.SENTRY_URL }} WISE_PRIMARY_ACCOUNT_API_KEY=${{ secrets.WISE_PRIMARY_ACCOUNT_API_KEY }} WISE_SECONDARY_ACCOUNT_API_KEY=${{ secrets.WISE_SECONDARY_ACCOUNT_API_KEY }} ENTRA_ID_CLIENT_ID=${{ secrets.ENTRA_ID_CLIENT_ID }} ENTRA_ID_TENANT_ID=${{ secrets.ENTRA_ID_TENANT_ID }} ENVIRONMENT=${{ vars.ENVIRONMENT }} MONTHLY_FINANCES_EXCEL_FILE_LINK=${{ secrets.MONTHLY_FINANCES_EXCEL_FILE_LINK }} MONGO_DB_CONNECTION_STRING=${{ secrets.MONGO_DB_CONNECTION_STRING }}

      - name: Restart Revision
        shell: bash
        run: |
          export REVISION_NAME=$(az containerapp revision list --name ${{ vars.AZURE_CONTAINER_APP_NAME }} --resource-group ${{ vars.AZURE_RESOURCE_GROUP_NAME }} --query "[0].name")
          az containerapp revision restart --revision "${REVISION_NAME//\"/}" --resource-group ${{ vars.AZURE_RESOURCE_GROUP_NAME }}